<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🔥 고기 마스터 프로 (유튜브 제어)</title>
  <script> {
      alert('페이지 로드에 문제가 발생하였습니다. 확인을 누르면 다시 로드합니다. 4초 정도 걸립니다.');
delay(3500)
    }
  </script>
    <style>
        body { background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; flex-direction: column; }
        .box { background: #333; padding: 25px; border-radius: 15px; text-align: center; width: 340px; border: 3px solid #ff4757; margin-bottom: 20px; }
        .ip-info { font-size: 13px; color: #ffeb3b; margin-bottom: 15px; font-weight: bold; background: #222; padding: 8px; border-radius: 5px; }
        select { width: 100%; padding: 12px; margin: 6px 0; border-radius: 5px; }
        #timer { font-size: 50px; font-weight: bold; margin: 20px 0; color: #ffeb3b; }
        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: #ff4757; color: white; margin-top: 10px; }
        
        /* 기본적으로 유튜브 영상 영역은 완전히 숨김 */
        #yt-container { display: none; margin-top: 20px; border: 2px solid #555; border-radius: 8px; overflow: hidden; height: 191px; }
        
        .admin-panel { background: #222; padding: 20px; border-radius: 15px; width: 340px; border: 2px dashed #00d2d3; display: none; text-align: left; }
        .admin-panel h3 { margin-top: 0; color: #00d2d3; text-align: center; }
        .admin-panel input { width: calc(100% - 20px); padding: 8px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #555; }
        .ip-list { margin-top: 10px; max-height: 100px; overflow-y: auto; background: #111; padding: 8px; border-radius: 5px; font-size: 12px; }
        .ip-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .del-btn { background: #ff4757; color: white; border: none; padding: 2px 6px; border-radius: 3px; cursor: pointer; font-size: 11px; width: auto; margin: 0; }
    </style>
</head>
<body>

<div class="box">
    <h2>🔥 고기 마스터 프로</h2>
    <div class="ip-info" id="ip-display">내 공인 IP 식별 중...</div>
    <div id="status-badge" style="color: #aaa; margin-bottom: 10px;">[일반 등급]</div>

    <select id="meat-type" onchange="updateParts()">
        <option value="beef">소고기</option>
        <option value="pork">돼지고기</option>
        <option id="kimchi-option" value="kimchi" disabled>김치 (프리미엄 전용)</option>
    </select>
    
    <select id="part"></select>
    
    <select id="level">
        <option value="rare">레어</option>
        <option value="medium-rare">미디움 레어</option>
        <option value="medium" selected>미디움</option>
        <option value="medium-well">미디움 웰던</option>
        <option value="welldone">웰던</option>
    </select>
    
    <div id="timer">00:00</div>
    <button onclick="start()">굽기 시작</button>
    <audio id="grill-sound" src="m.m4a"></audio>

    <div style="margin-top: 20px; border-top: 1px solid #444; padding-top: 15px;">
        <input type="password" id="admin-pw" placeholder="마스터 비밀번호" style="width:180px; padding:8px;">
        <button onclick="checkAdminPassword()" style="width:110px; padding:8px; font-size:12px; display:inline-block; margin:0;">관리자 인증</button>
    </div>
</div>

<!-- 📺 유튜브 컨테이너 박스 -->
<div id="yt-container">
    <iframe id="yt-player" width="340" height="191" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<div class="admin-panel" id="admin-panel">
    <h3>🛠️ 프리미엄 IP 제어 센터</h3>
    <label style="font-size:12px; color:#aaa;">프리미엄 부여할 공인 IP 입력:</label>
    <input type="text" id="target-ip" placeholder="예: 121.130.XX.XX">
    <button onclick="addPremiumIP()" style="background:#00d2d3; padding:8px; font-size:14px;">프리미엄 등록</button>
    
    <h4 style="margin-bottom:5px; font-size:13px; color:#ffeb3b;">현재 프리미엄 리스트</h4>
    <div class="ip-list" id="ip-list-box"></div>
</div>

<script>
    let myIP = "";
    let premiumIPs = JSON.parse(localStorage.getItem('meatPremiumIPs')) || [];

    fetch('https://api.ipify.org?format=json')
        .then(res => res.json())
        .then(data => {
            myIP = data.ip;
            document.getElementById('ip-display').innerText = "내 공인 IP: " + myIP;
            applyUserGrade();
        }).catch(() => {
            document.getElementById('ip-display').innerText = "IP 확인 불가 (인터넷 연결 끊김)";
        });

    function applyUserGrade() {
        if (premiumIPs.includes(myIP)) {
            document.getElementById('status-badge').innerText = "[✨ 프리미엄 등급]";
            document.getElementById('status-badge').style.color = "#00d2d3";
            document.getElementById('kimchi-option').disabled = false;
        } else {
            document.getElementById('status-badge').innerText = "[일반 등급]";
            document.getElementById('status-badge').style.color = "#aaa";
            document.getElementById('kimchi-option').disabled = true;
            if(document.getElementById('meat-type').value === 'kimchi') {
                document.getElementById('meat-type').value = 'beef';
                updateParts();
            }
        }
    }

    function checkAdminPassword() {
        if (document.getElementById('admin-pw').value === "102030405060708090") {
            document.getElementById('admin-panel').style.display = 'block';
            renderIPList();
            alert("마스터 권한 승인. IP 제어 패널이 열렸습니다.");
        } else {
            alert("틀렸다 ㅄ아");
        }
    }

    function addPremiumIP() {
        const ip = document.getElementById('target-ip').value.trim();
        if (!ip || premiumIPs.includes(ip)) return;
        premiumIPs.push(ip);
        localStorage.setItem('meatPremiumIPs', JSON.stringify(premiumIPs));
        document.getElementById('target-ip').value = "";
        renderIPList(); applyUserGrade();
    }

    function removePremiumIP(ip) {
        premiumIPs = premiumIPs.filter(item => item !== ip);
        localStorage.setItem('meatPremiumIPs', JSON.stringify(premiumIPs));
        renderIPList(); applyUserGrade();
    }

    function renderIPList() {
        const listBox = document.getElementById('ip-list-box');
        listBox.innerHTML = "";
        if(premiumIPs.length === 0) listBox.innerHTML = "<span style='color:#666'>등록된 IP 없음</span>";
        premiumIPs.forEach(ip => {
            listBox.innerHTML += `<div class="ip-item"><span>${ip} ${ip === myIP ? '(나)' : ''}</span><button class="del-btn" onclick="removePremiumIP('${ip}')">삭제</button></div>`;
        });
    }

    const partsData = {
        beef: ["등심", "안심", "갈빗살", "부채살", "토마호크"],
        pork: ["삼겹살", "목살", "항정살", "가브리살", "돈마호크"],
        kimchi: ["배추김치", "파김치", "총각김치"]
    };

    function updateParts() {
        const meat = document.getElementById('meat-type').value;
        const partSelect = document.getElementById('part');
        partSelect.innerHTML = "";
        partsData[meat].forEach(part => {
            const opt = document.createElement("option");
            opt.value = part; opt.textContent = part;
            partSelect.appendChild(opt);
        });
    }
    updateParts();

    let timer, sec = 0;
    function speak(text) {
        window.speechSynthesis.cancel();
        const s = new SpeechSynthesisUtterance(text);
        s.lang = 'ko-KR';
        window.speechSynthesis.speak(s);
    }

    function start() {
        clearInterval(timer);
        sec = 0;
        
        const meat = document.getElementById('meat-type').value;
        const part = document.getElementById('part').value;
        const level = document.getElementById('level').value;

        if(meat === 'kimchi' && !premiumIPs.includes(myIP)) {
            alert("김치는 프리미엄 등급만 구울 수 있습니다.");
            return;
        }

        // 💡 [수정] 시작할 때 프리미엄 유저라면 유튜브 주소 밀어넣고 강제 자동재생 및 노출
        if (premiumIPs.includes(myIP)) {
            document.getElementById('yt-player').src = "https://www.youtube.com/embed/RKJvo6fAMmg?autoplay=1&mute=0";
            document.getElementById('yt-container').style.display = 'block';
        } else {
            document.getElementById('yt-container').style.display = 'none';
        }

        document.getElementById('grill-sound').play();

        const times = {'rare': 120, 'medium-rare': 150, 'medium': 180, 'medium-well': 210, 'welldone': 270};
        let total = (meat === 'kimchi') ? {'rare': 90, 'medium-rare': 120, 'medium': 180, 'medium-well': 240, 'welldone': 300}[level] : times[level] * (meat === 'pork' ? 1.5 : 1);
        let flip = total / 2;

        speak(part + " 굽기를 시작합니다.");
        
        timer = setInterval(() => {
            sec++;
            document.getElementById('timer').innerText = Math.floor(sec/60).toString().padStart(2,0) + ":" + (sec%60).toString().padStart(2,0);
            
            if(sec === 10) speak("지금 당장 소금 뿌려! 간 안 맞으면 고기 맛없다고!!");
            if(sec === Math.floor(flip)) {
                if(meat === 'beef') speak("이봐! 고기 뒤집어! 안 뒤집으면 만 원 넘는 " + part + " 탄다!!");
                else if(meat === 'pork') speak("이봐! 고기 뒤집어! 안 그러면 " + part + " 다 타서 먹지도 못 할 거야!!");
                else speak("이봐! 김치 뒤집어! 안 그러면 김치 다 타서 써진다고!!");
            }
            
            if(sec === total) {
                clearInterval(timer);
                speak("끝났어! 지금 당장 꺼내! 안 그러면 다 타버려!");
                document.getElementById('grill-sound').pause();
                
                // 💡 [수정] 타이머가 완벽하게 끝나면 유튜브 소스 비우고 박스 숨겨서 완전 종료
                document.getElementById('yt-player').src = "";
                document.getElementById('yt-container').style.display = 'none';
            }
        }, 1000);
    }
</script>
</body>
</html>
