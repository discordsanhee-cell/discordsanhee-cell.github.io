<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지문 등록 & 로그인 테스트</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f2f5;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }
    .control-group {
      margin: 12px 0;
      text-align: left;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #444;
    }
    select, input[type="range"] {
      width: 100%;
      box-sizing: border-box;
    }
    .slider-container {
      display: flex;
      align-items: center;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }
    button {
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-register { background-color: #059669; }
    .btn-register:hover { background-color: #047857; }
    .btn-login { background-color: #2563eb; }
    .btn-login:hover { background-color: #1d4ed8; }
    .btn-reset { background-color: #6b7280; font-size: 12px; padding: 6px; margin-top: 10px; }
    #status {
      margin-top: 18px;
      font-weight: bold;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>🔒 지문 등록 및 인증</h2>
    
    <!-- TTS 설정 컨트롤러 -->
    <div class="control-group">
      <label for="voiceSelect">🔊 음성 선택</label>
      <select id="voiceSelect"></select>
    </div>

    <div class="control-group">
      <label for="pitch">🎵 피치: <span id="pitchVal">1.0</span></label>
      <div class="slider-container">
        <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1.0">
      </div>
    </div>

    <div class="control-group">
      <label for="rate">⚡ 속도: <span id="rateVal">1.0</span></label>
      <div class="slider-container">
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1.0">
      </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

    <!-- 버튼 영역 -->
    <div class="btn-group">
      <button id="regBtn" class="btn-register" onclick="registerBiometric()">1. 지문 최초 등록하기</button>
      <button id="authBtn" class="btn-login" onclick="authenticateBiometric()">2. 지문 인증하기</button>
    </div>

    <button class="btn-reset" onclick="resetBiometric()">등록 정보 초기화</button>

    <div id="status"></div>
  </div>

  <script>
    const voiceSelect = document.getElementById('voiceSelect');
    const pitchInput = document.getElementById('pitch');
    const rateInput = document.getElementById('rate');
    const pitchVal = document.getElementById('pitchVal');
    const rateVal = document.getElementById('rateVal');
    const statusDiv = document.getElementById('status');

    let voices = [];

    // --- TTS 함수 ---
    function loadVoices() {
      voices = speechSynthesis.getVoices();
      voiceSelect.innerHTML = '';
      const koVoices = voices.filter(v => v.lang.includes('ko'));
      const otherVoices = voices.filter(v => !v.lang.includes('ko'));
      
      [...koVoices, ...otherVoices].forEach(voice => {
        const option = document.createElement('option');
        option.textContent = `${voice.name} (${voice.lang})`;
        option.setAttribute('data-name', voice.name);
        if (voice.name.includes('Heami') || (voice.lang.includes('ko') && !voiceSelect.value)) {
          option.selected = true;
        }
        voiceSelect.appendChild(option);
      });
    }

    loadVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    pitchInput.addEventListener('input', () => pitchVal.textContent = pitchInput.value);
    rateInput.addEventListener('input', () => rateVal.textContent = rateInput.value);

    function speak(text) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      const selectedVoice = voices.find(v => v.name === voiceSelect.selectedOptions[0]?.getAttribute('data-name'));
      if (selectedVoice) utterance.voice = selectedVoice;
      utterance.pitch = parseFloat(pitchInput.value);
      utterance.rate = parseFloat(rateInput.value);
      window.speechSynthesis.speak(utterance);
    }

    // --- WebAuthn (생체 인증) 핵심 로직 ---

    // 1. 최초 지문 등록 (create)
    async function registerBiometric() {
      statusDiv.style.color = '#333';
      statusDiv.innerText = '지문 등록을 진행합니다...';

      try {
        const credential = await navigator.credentials.create({
          publicKey: {
            challenge: new Uint8Array(32),
            rp: { name: "GitHub Pages Auth" },
            user: {
              id: Uint8Array.from("user_id_123", c => c.charCodeAt(0)),
              name: "user@example.com",
              displayName: "사용자"
            },
            pubKeyCredParams: [{ alg: -7, type: "public-key" }],
            authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
            timeout: 60000
          }
        });

        if (credential) {
          // 생성된 Credential ID를 브라우저에 저장 (문자열 변환)
          const credentialId = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
          localStorage.setItem('registered_credential_id', credentialId);

          statusDiv.style.color = '#059669';
          statusDiv.innerText = '🎉 지문 등록 완료! 이제 [2. 지문 인증하기]를 눌러보세요.';
          speak("지문 등록이 완료되었습니다.");
        }
      } catch (err) {
        console.error(err);
        statusDiv.style.color = '#dc2626';
        statusDiv.innerText = '❌ 등록 실패 또는 취소되었습니다.';
      }
    }

    // 2. 등록된 지문으로 인증 (get)
    async function authenticateBiometric() {
      const savedId = localStorage.getItem('registered_credential_id');

      // 등록된 지문 정보가 없는 경우
      if (!savedId) {
        statusDiv.style.color = '#dc2626';
        statusDiv.innerText = '⚠️ 먼저 [1. 지문 최초 등록하기]를 진행해 주세요.';
        speak("먼저 지문을 등록해 주세요.");
        return;
      }

      statusDiv.style.color = '#333';
      statusDiv.innerText = '지문으로 인증하는 중...';

      try {
        // 저장된 ID를 Uint8Array 형태로 복원
        const rawId = Uint8Array.from(atob(savedId), c => c.charCodeAt(0));

        // 기존 등록된 키 기반 인증 요청
        const assertion = await navigator.credentials.get({
          publicKey: {
            challenge: new Uint8Array(32),
            allowCredentials: [{
              id: rawId,
              type: 'public-key'
            }],
            userVerification: "required",
            timeout: 60000
          }
        });

        if (assertion) {
          statusDiv.style.color = '#16a34a';
          statusDiv.innerText = '✅ 인증이 완료되었습니다!';
          
          // 설정해 둔 TTS 음성 실행
          speak("인증이 완료되었습니다.");
        }
      } catch (err) {
        console.error(err);
        statusDiv.style.color = '#dc2626';
        statusDiv.innerText = '❌ 인증 실패 (등록되지 않은 손가락이거나 취소됨)';
      }
    }

    // 3. 테스트용 등록 정보 초기화
    function resetBiometric() {
      localStorage.removeItem('registered_credential_id');
      statusDiv.style.color = '#6b7280';
      statusDiv.innerText = '등록 정보가 초기화되었습니다.';
    }
  </script>
</body>
</html>
