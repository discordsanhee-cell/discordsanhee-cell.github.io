<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🔥 고기 마스터 프로 (IP 프리미엄)</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; flex-direction: column; }
        .box { background: #333; padding: 25px; border-radius: 15px; text-align: center; width: 340px; border: 3px solid #ff4757; }
        .ip-info { font-size: 12px; color: #aaa; margin-bottom: 10px; }
        select { width: 100%; padding: 12px; margin: 6px 0; border-radius: 5px; }
        #timer { font-size: 50px; font-weight: bold; margin: 20px 0; color: #ffeb3b; }
        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: #ff4757; color: white; margin-top: 10px; }
        #yt-player { display: none; margin-top: 20px; border: 2px solid #555; border-radius: 8px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🔥 고기 마스터 프로</h2>
    <div class="ip-info" id="ip-display">내 공인 IP 로딩 중...</div>
    <div id="status-badge" style="color: #ffeb3b;">[일반 사용자]</div>

    <select id="meat-type" onchange="updateParts()">
        <option value="beef">소고기</option>
        <option value="pork">돼지고기</option>
        <option id="kimchi-option" value="kimchi" disabled>김치 (프리미엄 전용)</option>
    </select>
    
    <select id="part"></select>
    <select id="level">
        <option value="rare">레어</option>
        <option value="welldone">웰던</option>
    </select>
    
    <div id="timer">00:00</div>
    <button onclick="start()">굽기 시작</button>

    <div id="admin-section">
        <input type="password" id="admin-pw" placeholder="관리자 비밀번호">
        <button onclick="loginAdmin()">관리자 권한 인증</button>
    </div>
</div>

<iframe id="yt-player" width="340" height="191" src="https://www.youtube.com/embed/RKJvo6fAMmg" frameborder="0" allow="autoplay"></iframe>

<script>
    let currentIP = "";
    let premiumIPs = JSON.parse(localStorage.getItem('premiumIPs')) || [];

    // 1. IP 가져오기 (무료 API 활용)
    fetch('https://api.ipify.org?format=json')
        .then(response => response.json())
        .then(data => {
            currentIP = data.ip;
            document.getElementById('ip-display').innerText = "현재 접속 IP: " + currentIP;
            checkPremium();
        });

    function checkPremium() {
        if (premiumIPs.includes(currentIP)) {
            document.getElementById('status-badge').innerText = "[프리미엄 사용자]";
            document.getElementById('kimchi-option').disabled = false;
        }
    }

    function loginAdmin() {
        if (document.getElementById('admin-pw').value === "102030405060708090") {
            premiumIPs.push(currentIP);
            localStorage.setItem('premiumIPs', JSON.stringify(premiumIPs));
            alert("관리자 인증 완료! 해당 IP가 영구 프리미엄으로 등록되었습니다.");
            checkPremium();
        } else {
            alert("비밀번호 오류!");
        }
    }

    // [이하 기존 로직 동일]
    const partsData = { beef: ["등심", "안심"], pork: ["삼겹살"], kimchi: ["배추김치"] };
    function updateParts() {
        const meat = document.getElementById('meat-type').value;
        const partSelect = document.getElementById('part');
        partSelect.innerHTML = "";
        partsData[meat].forEach(p => partSelect.innerHTML += `<option value="${p}">${p}</option>`);
    }
    
    function start() {
        if (document.getElementById('meat-type').value === 'kimchi' && !premiumIPs.includes(currentIP)) {
            alert("프리미엄 전용입니다!"); return;
        }
        if (premiumIPs.includes(currentIP)) document.getElementById('yt-player').style.display = 'block';
        alert("굽기 시작!");
    }
    updateParts();
</script>
</body>
</html>
