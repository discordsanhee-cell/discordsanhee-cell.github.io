<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 실시간 스마트폰 카메라&마이크 연동 (WebRTC)</title>
    <!-- WebRTC 연결을 쉽게 해주는 PeerJS 라이브러리 로드 -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #2a2a35;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h2 { margin-top: 0; color: #4dadff; }
        .mode-selection {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-phone { background-color: #e84118; color: white; }
        .btn-pc { background-color: #00a8ff; color: white; }
        .btn-connect { background-color: #4cd137; color: white; margin-top: 10px; width: 100%; }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        
        .area { display: none; margin-top: 20px; background: #13131a; padding: 20px; border-radius: 12px; }
        video { width: 100%; max-width: 100%; border-radius: 8px; background: #000; }
        
        input {
            width: calc(100% - 24px);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #222;
            color: white;
            font-size: 16px;
            text-align: center;
            margin-bottom: 10px;
        }
        .status-msg { color: #fbc531; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎥 모바일 카메라/마이크 -> PC 실시간 연동</h2>
    <p>현재 기기가 무엇인지 선택해 주세요.</p>
    
    <div class="mode-selection">
        <button class="btn-phone" onclick="showPhoneArea()">📱 스마트폰 (카메라/마이크 송신)</button>
        <button class="btn-pc" onclick="showPCArea()">💻 컴퓨터 (화면/소리 수신)</button>
    </div>

    <!-- 1. 스마트폰 전용 영역 -->
    <div id="phone-area" class="area">
        <h3>스마트폰 방송 설정</h3>
        <input type="text" id="my-custom-id" placeholder="사용할 짧은 방 번호 입력 (예: 1234)">
        <button class="btn-phone" onclick="initPhone()">📡 방송 시작하기</button>
        <div id="phone-status" class="status-msg"></div>
        <video id="local-video" autoplay playsinline muted style="margin-top: 15px; transform: scaleX(-1);"></video>
    </div>

    <!-- 2. 컴퓨터 전용 영역 -->
    <div id="pc-area" class="area">
        <h3>컴퓨터 수신 대기</h3>
        <p>스마트폰에서 설정한 방 번호를 입력하세요:</p>
        <input type="text" id="target-id" placeholder="방 번호 입력 (예: 1234)">
        <button class="btn-connect" onclick="connectToPhone()">🔒 카메라/마이크 연결하기</button>
        <!-- 컴퓨터 쪽 비디오는 마이크 소리도 나도록 muted를 빼고 재생합니다 -->
        <video id="remote-video" autoplay playsinline style="margin-top: 15px;"></video>
    </div>
</div>

<script>
    let peer;
    let localStream;

    function showPhoneArea() {
        document.getElementById('phone-area').style.display = 'block';
        document.getElementById('pc-area').style.display = 'none';
    }

    function showPCArea() {
        document.getElementById('pc-area').style.display = 'block';
        document.getElementById('phone-area').style.display = 'none';
        peer = new Peer(); // 컴퓨터는 자동 랜덤 ID 생성해도 무관
    }

    // 📱 스마트폰에서 방송 시작 버튼 눌렀을 때
    function initPhone() {
        const customId = document.getElementById('my-custom-id').value.trim();
        if (!customId) {
            alert("원하는 방 번호(숫자나 문자)를 입력해 주세요!");
            return;
        }

        // 💡 사용자가 입력한 짧은 ID로 Peer 서버 연결 생성
        peer = new Peer(customId);

        peer.on('open', (id) => {
            document.getElementById('phone-status').innerText = `상태: [ ${id} ] 번방으로 방송 중!`;
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                alert("이미 다른 사람이 사용 중인 번호입니다. 다른 번호를 입력해 주세요.");
            } else {
                alert("오류 발생: " + err.type);
            }
        });

        // 💡 video: true와 함께 audio: true를 주어 마이크 권한도 함께 땁니다.
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" }, // 후면 카메라
            audio: true // 마이크 켜기!
        }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;

            // 컴퓨터가 전화를 걸어오면 내 카메라+마이크 스트림을 넘겨줌
            peer.on('call', (call) => {
                call.answer(localStream);
            });
        }).catch(err => {
            alert("카메라 및 마이크 권한을 허용해야 합니다: " + err);
        });
    }

    // 💻 컴퓨터에서 연결 버튼 클릭 시
    function connectToPhone() {
        const targetId = document.getElementById('target-id').value.trim();
        if (!targetId) {
            alert("연결할 스마트폰 방 번호를 입력해 주세요.");
            return;
        }

        // PeerJS 특성상 가짜 미디어스트림을 던져서 수신을 유도합니다.
        const fakeStream = new MediaStream();
        const call = peer.call(targetId, fakeStream);

        call.on('stream', (remoteStream) => {
            const remoteVideo = document.getElementById('remote-video');
            remoteVideo.srcObject = remoteStream;
            
            // 브라우저 보안 정책상 첫 로드 시 소리가 안 나올 수 있으므로 안심 재생 처리
            remoteVideo.play().catch(e => {
                console.log("자동 재생을 위해 화면을 한 번 클릭해 주세요.");
            });
        });
    }
</script>

</body>
</html>
