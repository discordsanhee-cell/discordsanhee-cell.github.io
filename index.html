<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎥 완벽 연동 스마트폰 웹캠 (PC 장치 불필요)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #2d2d2d; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: #00d2ff; margin-top: 0; }
        .btn-box { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; }
        .btn-phone { background: #ff4757; }
        .btn-pc { background: #1e90ff; }
        .btn-action { background: #2ed573; width: 100%; margin-top: 10px; }
        .section { display: none; background: #222; padding: 20px; border-radius: 10px; }
        input { width: calc(100% - 24px); padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #555; background: #111; color: white; text-align: center; font-size: 18px; font-weight: bold; }
        video { width: 100%; border-radius: 8px; background: black; margin-top: 15px; }
        .log { color: #ffa502; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>📱 스마트폰 ➡️ PC 실시간 전송</h2>
    
    <div id="select-mode" class="btn-box">
        <button class="btn-phone" onclick="showSection('phone')">📱 스마트폰<br>(카메라 켜기)</button>
        <button class="btn-pc" onclick="showSection('pc')">💻 컴퓨터<br>(화면 보기)</button>
    </div>

    <!-- 스마트폰 송신 영역 -->
    <div id="phone-section" class="section">
        <h3>스마트폰 방 만들기</h3>
        <input type="text" id="room-id" placeholder="원하는 방 번호 (예: 777)">
        <button class="btn-action" onclick="startBroadcast()">방송 시작</button>
        <div id="phone-log" class="log"></div>
        <video id="local-video" autoplay playsinline muted></video>
    </div>

    <!-- 컴퓨터 수신 영역 -->
    <div id="pc-section" class="section">
        <h3>컴퓨터 수신하기</h3>
        <input type="text" id="target-id" placeholder="스마트폰 방 번호 입력">
        <button class="btn-action" onclick="connectToPhone()">화면 연결</button>
        <div id="pc-log" class="log"></div>
        <video id="remote-video" autoplay playsinline controls></video>
    </div>
</div>

<script>
    let peer;

    function showSection(type) {
        document.getElementById('select-mode').style.display = 'none';
        if (type === 'phone') document.getElementById('phone-section').style.display = 'block';
        if (type === 'pc') document.getElementById('pc-section').style.display = 'block';
    }

    // 📱 [스마트폰] 방송 시작
    function startBroadcast() {
        const roomId = document.getElementById('room-id').value.trim();
        if (!roomId) return alert("방 번호를 입력하세요!");

        peer = new Peer(roomId);

        peer.on('open', () => {
            document.getElementById('phone-log').innerText = `✅ [${roomId}]번 방이 열렸습니다.`;
        });

        peer.on('error', (err) => alert("오류: " + err.type));

        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" }, 
            audio: true 
        }).then(stream => {
            document.getElementById('local-video').srcObject = stream;
            // PC가 전화를 걸어오면 화면/소리 전달
            peer.on('call', call => call.answer(stream));
        }).catch(err => alert("카메라/마이크 권한을 허용해주세요."));
    }

    // 💻 [PC] 화면 연결 (캠/마이크 없어도 작동하도록 가상 스트림 생성)
    function connectToPhone() {
        const targetId = document.getElementById('target-id').value.trim();
        if (!targetId) return alert("방 번호를 입력하세요!");

        if (!peer) peer = new Peer(); // PC는 무작위 ID 발급

        peer.on('open', () => {
            document.getElementById('pc-log').innerText = "연결 시도 중...";
            
            // PC에 캠이 없어서 나는 에러를 막기 위한 가상 스트림(Dummy Stream) 생성
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const dummyStream = ctx.createMediaStreamDestination().stream;

            const call = peer.call(targetId, dummyStream);

            call.on('stream', remoteStream => {
                document.getElementById('pc-log').innerText = "🟢 연결 성공! (클릭하면 소리가 켜집니다)";
                const remoteVideo = document.getElementById('remote-video');
                remoteVideo.srcObject = remoteStream;
                remoteVideo.play();
            });

            call.on('error', () => {
                document.getElementById('pc-log').innerText = "❌ 연결 실패. 스마트폰 방 번호를 확인하세요.";
            });
        });
    }
</script>

</body>
</html>
